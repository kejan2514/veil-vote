name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the smallest reproducible steps or test.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS and Seismic Foundry version.

