name: Contracts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  SEISMIC_DIR: /tmp/.seismic

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Seismic Foundry
        run: |
          mkdir -p "$SEISMIC_DIR/bin"
          curl -fsSL \
            "https://raw.githubusercontent.com/SeismicSystems/seismic-foundry/seismic/sfoundryup/sfoundryup" \
            -o "$SEISMIC_DIR/bin/sfoundryup"
          chmod +x "$SEISMIC_DIR/bin/sfoundryup"
          "$SEISMIC_DIR/bin/sfoundryup"
      - name: Check formatting
        working-directory: contracts
        run: $SEISMIC_DIR/bin/sforge fmt --check
      - name: Run tests
        working-directory: contracts
        run: $SEISMIC_DIR/bin/sforge test -vv
